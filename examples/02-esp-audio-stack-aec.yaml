# ESP Audio Stack + lightweight AEC.
#
# What this example proves:
#   esp_audio_stack can feed a lightweight echo canceller and expose processed
#   microphone audio through the normal ESPHome microphone surface.

substitutions:
  name: audio-stack-aec
  friendly_name: Audio Stack AEC

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

# esp_aec implements the AudioProcessor interface, so the processor interface lives in esp_audio_stack
# here by design.
external_components:
  - source: ../esphome/components
    components:
      - esp_audio_stack
      - esp_aec

i2c:
  sda: GPIO47
  scl: GPIO48
  frequency: 400kHz

# Lightweight echo canceller.
#
# mode:
#   fd_high_perf is the full-duplex high-performance mode from ESP-SR 2.4+.
#
# filter_length:
#   Echo filter length. Higher values can track longer echo tails but cost more
#   CPU and memory.
esp_aec:
  id: aec
  sample_rate: 16000
  mode: fd_high_perf
  filter_length: 4

# Audio owner with processor_id wired to esp_aec.
#
# Type2-style software reference: the speaker stream is staged in a tunable
# ring buffer so AEC can remove echo from the microphone stream. For the lighter
# path, use `aec_reference: previous_frame` and omit aec_reference_buffer_ms.
esp_audio_stack:
  id: audio_stack
  sample_rate: 48000
  output_sample_rate: 16000
  bits_per_sample: 32
  slot_bit_width: 32
  processor_id: aec
  aec_reference: ring_buffer
  aec_reference_buffer_ms: 120

  i2s_mclk_pin: GPIO5
  i2s_bclk_pin: GPIO6
  i2s_lrclk_pin: GPIO7
  i2s_din_pin: GPIO4
  i2s_dout_pin: GPIO8

  codec:
    input:
      type: es8311
      address: 0x18
    output:
      type: es8311
      address: 0x18

microphone:
  - platform: esp_audio_stack
    id: clean_mic
    esp_audio_stack_id: audio_stack

speaker:
  - platform: esp_audio_stack
    id: hw_speaker
    esp_audio_stack_id: audio_stack
    buffer_duration: 500ms

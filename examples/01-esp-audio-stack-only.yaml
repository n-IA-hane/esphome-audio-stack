# ESP Audio Stack only: codec-backed full-duplex microphone + speaker.
#
# What this example proves:
#   esp_audio_stack can own a codec/I2S audio path and expose normal ESPHome
#   microphone/speaker surfaces without enabling AEC or AFE processing.
#
# Contract:
#   This base profile lists only esp_audio_stack. Shared primitives are internal
#   headers, not public ESPHome components.

substitutions:
  name: audio-stack-only
  friendly_name: Audio Stack Only

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

# Generic ESP32-S3 target. Replace board/pins with the real codec board.
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

# Component source under test.
external_components:
  - source: ../esphome/components
    components:
      - esp_audio_stack

# Codec control bus. ES8311 commonly uses I2C address 0x18.
i2c:
  sda: GPIO47
  scl: GPIO48
  frequency: 400kHz

# Full-duplex audio owner.
#
# sample_rate:
#   Physical codec/I2S bus rate. 48 kHz is a good speaker/media rate.
#
# output_sample_rate:
#   Microphone rate exposed to ESPHome consumers. 16 kHz is the normal voice
#   assistant / wake word / VoIP rate.
#
# bits_per_sample / slot_bit_width:
#   Codec bus format. 32-bit slots are common even when public PCM is 16-bit.
esp_audio_stack:
  id: audio_stack
  sample_rate: 48000
  output_sample_rate: 16000
  bits_per_sample: 32
  slot_bit_width: 32

  # I2S pins. These are placeholders for an ES8311-style S3 codec board.
  i2s_mclk_pin: GPIO5
  i2s_bclk_pin: GPIO6
  i2s_lrclk_pin: GPIO7
  i2s_din_pin: GPIO4
  i2s_dout_pin: GPIO8

  # Codec input and output. With no processor_id, the microphone surface emits
  # raw converted microphone audio.
  codec:
    input:
      type: es8311
      address: 0x18
    output:
      type: es8311
      address: 0x18

# Public microphone. Downstream components consume this, not raw I2S.
microphone:
  - platform: esp_audio_stack
    id: raw_mic
    esp_audio_stack_id: audio_stack

# Public speaker. Media/TTS/VoIP layers can feed this directly or through
# ESPHome mixer/resampler components.
speaker:
  - platform: esp_audio_stack
    id: hw_speaker
    esp_audio_stack_id: audio_stack
    buffer_duration: 500ms

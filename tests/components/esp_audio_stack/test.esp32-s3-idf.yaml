esphome:
  name: test-esp-audio-stack

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

i2c:
  sda: GPIO47
  scl: GPIO48

esp_audio_stack:
  id: audio_stack
  sample_rate: 48000
  output_sample_rate: 16000
  bits_per_sample: 32
  slot_bit_width: 32
  i2s_mclk_pin: GPIO5
  i2s_bclk_pin: GPIO6
  i2s_lrclk_pin: GPIO7
  i2s_din_pin: GPIO4
  i2s_dout_pin: GPIO8
  codec:
    input:
      type: es8311
    output:
      type: es8311

microphone:
  - platform: esp_audio_stack
    id: stack_mic
    esp_audio_stack_id: audio_stack

speaker:
  - platform: esp_audio_stack
    id: stack_speaker
    esp_audio_stack_id: audio_stack
    buffer_duration: 500ms

switch:
  - platform: esp_audio_stack
    esp_audio_stack_id: audio_stack
    aec:
      name: AEC

number:
  - platform: esp_audio_stack
    esp_audio_stack_id: audio_stack
    mic_gain:
      name: Mic Gain
    master_volume:
      name: Master Volume
      speaker_id: stack_speaker
